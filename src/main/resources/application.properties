spring.application.name=actuator-poc
server.port=8080
spring.thymeleaf.check-template-location=false

spring.boot.admin.context-path=/admin
spring.boot.admin.client.url=http://localhost:8080/admin
spring.boot.admin.client.instance.name=${spring.application.name}
spring.boot.admin.client.instance.service-base-url=http://localhost:${server.port}
spring.boot.admin.client.instance.metadata.environment=${info.app.environment}

# Actuator: common endpoints exposed in every environment.
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always

# Info metadata used by /actuator/info.
info.app.name=Actuator POC
info.app.description=Reusable Spring Boot Actuator template
info.app.version=@project.version@
info.app.owner=Platform Team
info.app.service=actuator-poc
info.app.environment=default
info.app.api-style=rest

# Sample dependency toggle used by the custom health indicator.
monitoring.sample-dependency.available=true
